# Extract.io Production Infrastructure
# Supports: Backend, Frontend, PostgreSQL, and Caddy (Auto-SSL)

services:
  db:
    image: postgres:16-alpine
    container_name: extract-io-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-extract_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-extract_pass}
      POSTGRES_DB: ${DB_NAME:-extract_io}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: extract-io-backend
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN # Required for Playwright
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://${DB_USER:-extract_user}:${DB_PASSWORD:-extract_pass}@db:5432/${DB_NAME:-extract_io}
      CLERK_PUBLIC_KEY: ${CLERK_PUBLIC_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      API_KEY_PEPPER: ${API_KEY_PEPPER}
      ALLOWED_ORIGINS: "https://${DOMAIN},http://${DOMAIN}"
    env_file: .env

  frontend:
    build: 
      context: ./frontend
      args:
        - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
    container_name: extract-io-frontend
    restart: unless-stopped
    depends_on:
      - backend

  caddy:
    image: caddy:latest
    container_name: extract-io-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
